openapi: "3.0.3"
info:
  title: Sluice Control Plane API
  description: REST API for managing the Sluice credential-injecting approval proxy.
  version: "1.0.0"
  license:
    name: MIT

servers:
  - url: http://127.0.0.1:3000
    description: Local health/API server

security:
  - bearerAuth: []

paths:
  /healthz:
    get:
      operationId: getHealthz
      summary: Health check
      security: []
      tags: [health]
      responses:
        "200":
          description: Proxy is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Proxy is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/status:
    get:
      operationId: getApiStatus
      summary: Proxy status and stats
      tags: [status]
      responses:
        "200":
          description: Current proxy status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /api/approvals:
    get:
      operationId: getApiApprovals
      summary: List pending approval requests
      tags: [approvals]
      responses:
        "200":
          description: Pending approval requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApprovalRequest"

  /api/approvals/{id}/resolve:
    post:
      operationId: postApiApprovalsIdResolve
      summary: Resolve a pending approval request
      tags: [approvals]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveRequest"
      responses:
        "200":
          description: Approval resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveResponse"
        "404":
          description: Approval not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Approval already resolved or timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/rules:
    get:
      operationId: getApiRules
      summary: List policy rules
      tags: [rules]
      parameters:
        - name: verdict
          in: query
          schema:
            type: string
            enum: [allow, deny, ask, redact]
        - name: type
          in: query
          schema:
            type: string
            enum: [network, tool, pattern]
      responses:
        "200":
          description: Policy rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rule"
    post:
      operationId: postApiRules
      summary: Add a policy rule
      tags: [rules]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRuleRequest"
      responses:
        "201":
          description: Rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rule"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/rules/{id}:
    delete:
      operationId: deleteApiRulesId
      summary: Remove a policy rule
      tags: [rules]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Rule removed
        "404":
          description: Rule not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/rules/import:
    post:
      operationId: postApiRulesImport
      summary: Import rules from TOML
      tags: [rules]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: TOML config file
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"
        "400":
          description: Invalid TOML
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/rules/export:
    get:
      operationId: getApiRulesExport
      summary: Export rules as TOML
      tags: [rules]
      responses:
        "200":
          description: TOML export
          content:
            application/toml:
              schema:
                type: string

  /api/config:
    get:
      operationId: getApiConfig
      summary: Get current configuration
      tags: [config]
      responses:
        "200":
          description: Current config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Config"
    patch:
      operationId: patchApiConfig
      summary: Update configuration
      tags: [config]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigUpdate"
      responses:
        "200":
          description: Config updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Config"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/credentials:
    get:
      operationId: getApiCredentials
      summary: List credential names
      tags: [credentials]
      responses:
        "200":
          description: Credential names (values are never exposed)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Credential"
    post:
      operationId: postApiCredentials
      summary: Add a credential
      tags: [credentials]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCredentialRequest"
      responses:
        "201":
          description: Credential added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Credential"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Credential already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/credentials/{name}:
    patch:
      operationId: patchApiCredentialsName
      summary: Replace the value of an existing credential
      tags: [credentials]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialUpdate"
      responses:
        "204":
          description: Credential updated
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Credential not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteApiCredentialsName
      summary: Remove a credential
      tags: [credentials]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Credential removed
        "404":
          description: Credential not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/bindings:
    get:
      operationId: getApiBindings
      summary: List credential bindings
      tags: [bindings]
      responses:
        "200":
          description: Credential bindings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Binding"
    post:
      operationId: postApiBindings
      summary: Add a credential binding
      tags: [bindings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBindingRequest"
      responses:
        "201":
          description: Binding created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Binding"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Binding already exists for this credential and destination
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/bindings/{id}:
    patch:
      operationId: patchApiBindingsId
      summary: Update a credential binding
      tags: [bindings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BindingUpdate"
      responses:
        "200":
          description: Binding updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Binding"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Binding not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Destination collides with an existing binding for the same credential
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteApiBindingsId
      summary: Remove a credential binding
      tags: [bindings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Binding removed
        "404":
          description: Binding not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/mcp/upstreams:
    get:
      operationId: getApiMcpUpstreams
      summary: List MCP upstreams
      tags: [mcp]
      responses:
        "200":
          description: MCP upstreams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MCPUpstream"
    post:
      operationId: postApiMcpUpstreams
      summary: Add an MCP upstream
      tags: [mcp]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMCPUpstreamRequest"
      responses:
        "201":
          description: Upstream created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MCPUpstream"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Upstream already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/mcp/upstreams/{name}:
    delete:
      operationId: deleteApiMcpUpstreamsName
      summary: Remove an MCP upstream
      tags: [mcp]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Upstream removed
        "404":
          description: Upstream not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/audit/recent:
    get:
      operationId: getApiAuditRecent
      summary: Recent audit log entries
      tags: [audit]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 1000
      responses:
        "200":
          description: Recent audit entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEntry"

  /api/audit/verify:
    get:
      operationId: getApiAuditVerify
      summary: Verify audit log hash chain
      tags: [audit]
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyResult"

  /api/channels:
    get:
      operationId: getApiChannels
      summary: List notification channels
      tags: [channels]
      responses:
        "200":
          description: Notification channels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Channel"

  /api/channels/{id}:
    patch:
      operationId: patchApiChannelsId
      summary: Update a notification channel
      tags: [channels]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChannelUpdate"
      responses:
        "200":
          description: Channel updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: API token set via SLUICE_API_TOKEN env var

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        code:
          type: string

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    StatusResponse:
      type: object
      required: [proxy_listening, pending_approvals, channels]
      properties:
        proxy_listening:
          type: boolean
        pending_approvals:
          type: integer
        channels:
          type: array
          items:
            $ref: "#/components/schemas/ChannelStatus"

    ChannelStatus:
      type: object
      required: [type, enabled]
      properties:
        type:
          type: string
          enum: [telegram, http]
        enabled:
          type: boolean

    ApprovalRequest:
      type: object
      required: [id, destination, port, created_at]
      properties:
        id:
          type: string
        destination:
          type: string
        port:
          type: integer
        created_at:
          type: string
          format: date-time

    ResolveRequest:
      type: object
      required: [verdict]
      properties:
        verdict:
          type: string
          enum: [allow_once, always_allow, deny]

    ResolveResponse:
      type: object
      required: [id, verdict]
      properties:
        id:
          type: string
        verdict:
          type: string

    Rule:
      type: object
      required: [id, verdict]
      properties:
        id:
          type: integer
          format: int64
        verdict:
          type: string
          enum: [allow, deny, ask, redact]
        destination:
          type: string
        tool:
          type: string
        pattern:
          type: string
        replacement:
          type: string
        ports:
          type: array
          items:
            type: integer
        protocols:
          type: array
          items:
            type: string
        name:
          type: string
        source:
          type: string
        created_at:
          type: string
          format: date-time

    CreateRuleRequest:
      type: object
      required: [verdict]
      properties:
        verdict:
          type: string
          enum: [allow, deny, ask, redact]
        destination:
          type: string
        tool:
          type: string
        pattern:
          type: string
        replacement:
          type: string
        ports:
          type: array
          items:
            type: integer
        protocols:
          type: array
          items:
            type: string
        name:
          type: string

    ImportResult:
      type: object
      required:
        - rules_inserted
        - rules_skipped
        - bindings_inserted
        - bindings_skipped
        - upstreams_inserted
        - upstreams_skipped
        - config_set
      properties:
        rules_inserted:
          type: integer
        rules_skipped:
          type: integer
        bindings_inserted:
          type: integer
        bindings_skipped:
          type: integer
        upstreams_inserted:
          type: integer
        upstreams_skipped:
          type: integer
        config_set:
          type: integer

    Config:
      type: object
      properties:
        default_verdict:
          type: string
          enum: [allow, deny, ask]
        timeout_sec:
          type: integer
        vault_provider:
          type: string
        vault_dir:
          type: string

    ConfigUpdate:
      type: object
      properties:
        default_verdict:
          type: string
          enum: [allow, deny, ask]
        timeout_sec:
          type: integer

    Credential:
      type: object
      required: [name]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [static, oauth]
          description: Credential type (static or oauth)
        token_url:
          type: string
          description: Token endpoint URL (only for oauth type)

    CreateCredentialRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        value:
          type: string
          description: The credential secret value (stored encrypted). Required for static type.
        type:
          type: string
          enum: [static, oauth]
          default: static
          description: Credential type. Defaults to static.
        token_url:
          type: string
          description: Token endpoint URL (required when type is oauth)
        access_token:
          type: string
          description: OAuth access token (required when type is oauth)
        refresh_token:
          type: string
          description: OAuth refresh token (optional, for token rotation)
        destination:
          type: string
          description: If set, also creates an allow rule and binding
        ports:
          type: array
          items:
            type: integer
        header:
          type: string
        template:
          type: string
        env_var:
          type: string
          description: Environment variable name for phantom token injection into the agent container

    Binding:
      type: object
      required: [id, destination, credential]
      properties:
        id:
          type: integer
          format: int64
        destination:
          type: string
        ports:
          type: array
          items:
            type: integer
        credential:
          type: string
        header:
          type: string
        template:
          type: string
        protocols:
          type: array
          items:
            type: string
        env_var:
          type: string
          description: Environment variable name for phantom token injection
        created_at:
          type: string
          format: date-time

    CreateBindingRequest:
      type: object
      description: |
        Creates a binding between a credential and a destination. The server
        rejects duplicates: a binding on the same (credential, destination)
        pair may only exist once. Repeated POSTs return 409 Conflict.
      required: [destination, credential]
      properties:
        destination:
          type: string
        credential:
          type: string
        ports:
          type: array
          items:
            type: integer
        header:
          type: string
        template:
          type: string
        protocols:
          type: array
          items:
            type: string
        env_var:
          type: string
          description: Environment variable name for phantom token injection

    BindingUpdate:
      type: object
      description: |
        Partial update for a binding. At least one field must be set in the
        request body, otherwise the server returns 400 Bad Request (matching
        the CLI). Only fields that are present are modified. Setting
        `destination` to a non-empty value also updates the paired
        auto-created allow rule (tagged with `binding-add:<credential>` or
        `cred-add:<credential>`) so the new destination is not orphaned. If
        the paired rule has been removed manually, the binding destination
        is still updated and a warning is logged (no fallback rule is
        created). Passing an empty array for `ports` or `protocols` clears
        them. Passing an empty string for `header`, `template`, or `env_var`
        clears the field. Updating `destination` to a value that collides
        with another binding on the same credential returns 409 Conflict.
      properties:
        destination:
          type: string
        ports:
          type: array
          items:
            type: integer
        header:
          type: string
        template:
          type: string
        protocols:
          type: array
          items:
            type: string
        env_var:
          type: string
          description: Environment variable name for phantom token injection

    CredentialUpdate:
      type: object
      description: |
        New value for an existing credential. For static credentials, set
        `value`. For OAuth credentials, set `access_token` and optionally
        `refresh_token`. The existing `token_url` is preserved.

        PATCH semantics: omitting `refresh_token` for an OAuth credential
        preserves the currently stored refresh token. To explicitly clear
        the refresh token, send an empty string (`"refresh_token": ""`).
        This prevents clients that rotate only the access token from
        silently destroying the stored refresh token.
      properties:
        value:
          type: string
          description: New secret value (for static credentials)
        access_token:
          type: string
          description: New OAuth access token (for oauth credentials)
        refresh_token:
          type: string
          description: |
            New OAuth refresh token (for oauth credentials). Omit to
            preserve the existing refresh token. Send an empty string to
            clear it.

    MCPUpstream:
      type: object
      required: [id, name, command]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        command:
          type: string
        transport:
          type: string
          description: "Transport type: stdio, http, or websocket"
        args:
          type: array
          items:
            type: string
        env:
          type: object
          additionalProperties:
            type: string
        timeout_sec:
          type: integer
        created_at:
          type: string
          format: date-time

    CreateMCPUpstreamRequest:
      type: object
      required: [name, command]
      properties:
        name:
          type: string
        command:
          type: string
        transport:
          type: string
          description: "Transport type: stdio (default), http, or websocket"
        args:
          type: array
          items:
            type: string
        env:
          type: object
          additionalProperties:
            type: string
        timeout_sec:
          type: integer

    AuditEntry:
      type: object
      required: [timestamp, verdict]
      properties:
        timestamp:
          type: string
          format: date-time
        prev_hash:
          type: string
        destination:
          type: string
        port:
          type: integer
        verdict:
          type: string
        reason:
          type: string
        tool:
          type: string
        action:
          type: string
        credential_used:
          type: string

    VerifyResult:
      type: object
      required: [total_lines, valid_links, broken_links, legacy_lines]
      properties:
        total_lines:
          type: integer
        valid_links:
          type: integer
        broken_links:
          type: array
          items:
            $ref: "#/components/schemas/BrokenLink"
        legacy_lines:
          type: integer

    BrokenLink:
      type: object
      required: [line_number, expected_hash, actual_hash]
      properties:
        line_number:
          type: integer
        expected_hash:
          type: string
        actual_hash:
          type: string

    Channel:
      type: object
      required: [id, type, enabled]
      properties:
        id:
          type: integer
          format: int64
        type:
          type: string
          enum: [telegram, http]
        enabled:
          type: boolean
        webhook_url:
          type: string
          description: Webhook URL for HTTP channels
        webhook_secret:
          type: string
          description: HMAC secret for signing webhook payloads
        created_at:
          type: string
          format: date-time

    ChannelUpdate:
      type: object
      properties:
        enabled:
          type: boolean
        webhook_url:
          type: string
        webhook_secret:
          type: string
