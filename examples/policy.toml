# Example Sluice policy for running OpenClaw behind a transparent proxy.
# Copy this file and adjust to your needs.

[policy]
default = "ask"
timeout_sec = 120

[telegram]
bot_token_env = "TELEGRAM_BOT_TOKEN"
chat_id_env = "TELEGRAM_CHAT_ID"

# Vault configuration (age-encrypted credential store)
# For age-encrypted local vault:
[vault]
provider = "age"

# For HashiCorp Vault (uncomment and configure):
# [vault]
# provider = "hashicorp"
# addr = "https://vault.example.com:8200"   # or set addr_env = "VAULT_ADDR"
# token_env = "VAULT_TOKEN"                 # token auth
# mount = "secret"                          # KV v2 mount path (default: "secret")
# path_prefix = "sluice"                    # key prefix (default: "sluice")
# # For AppRole auth instead of token:
# # role_id_env = "VAULT_ROLE_ID"
# # secret_id_env = "VAULT_SECRET_ID"

# --- Network policy rules ---

# AI model APIs
[[allow]]
destination = "api.anthropic.com"
ports = [443]

[[allow]]
destination = "api.openai.com"
ports = [443]

# Telegram (needed for approval bot)
[[allow]]
destination = "*.telegram.org"
ports = [443]

# Block cloud metadata endpoints
[[deny]]
destination = "169.254.169.254"

[[deny]]
destination = "100.100.100.200"

# --- Credential bindings ---
# These map destinations to vault credentials for automatic injection.

[[binding]]
destination = "api.anthropic.com"
ports = [443]
credential = "anthropic_api_key"
inject_header = "x-api-key"

[[binding]]
destination = "api.openai.com"
ports = [443]
credential = "openai_api_key"
inject_header = "Authorization"
template = "Bearer {value}"

# --- MCP upstream servers ---
# Each upstream is spawned as a child process by the MCP gateway.
# timeout_sec sets the per-upstream request timeout (default: 120s).

# [[mcp_upstream]]
# name = "github"
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-github"]
# timeout_sec = 60

# [[mcp_upstream]]
# name = "filesystem"
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-filesystem", "/workspace"]
# timeout_sec = 30

# --- MCP tool policies ---

[[tool_allow]]
tool = "github__list_*"

[[tool_allow]]
tool = "github__get_*"

[[tool_ask]]
tool = "github__create_*"

[[tool_ask]]
tool = "github__update_*"

[[tool_ask]]
tool = "github__delete_*"

[[tool_ask]]
tool = "filesystem__write_*"

[[tool_deny]]
tool = "exec__*"

# --- Content inspection ---

[[inspect_block]]
pattern = "(?i)(sk-[a-zA-Z0-9_-]{20,})"
name = "api_key_leak"
note = "Block tool arguments containing API key patterns (covers both Anthropic sk-ant-* and OpenAI sk-* formats)"

[[inspect_redact]]
pattern = "(?i)(sk-[a-zA-Z0-9_-]{20,})"
replacement = "[REDACTED_API_KEY]"
name = "api_key_in_response"
note = "Redact API keys in tool responses"
