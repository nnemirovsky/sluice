# Example Sluice TOML seed file for initial database population.
# Import into the SQLite store with: sluice policy import config.toml
# This file is only read once to seed an empty database. At runtime, all
# policy state lives in the SQLite store (unified rules table, typed config
# singleton, bindings, channels, MCP upstreams). Use "sluice policy
# add/remove" or Telegram /policy commands to modify rules after seeding.
#
# Rules use a unified format: [[allow]], [[deny]], [[ask]], [[redact]].
# Each entry carries exactly one of: destination (network), tool (MCP),
# or pattern (content inspection). The section name determines the verdict.
# Telegram env var names (TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID) are
# hardcoded and not part of this config file.

[policy]
default = "ask"
timeout_sec = 120

# Vault configuration (age-encrypted credential store)
# For age-encrypted local vault:
[vault]
provider = "age"

# For HashiCorp Vault (uncomment and configure):
# [vault]
# provider = "hashicorp"
# [vault.hashicorp]
# addr = "https://vault.example.com:8200"   # or set VAULT_ADDR env var
# token = ""                                # token auth (or set VAULT_TOKEN env var)
# mount = "secret"                          # KV v2 mount path (default: "secret")
# prefix = "sluice/"                        # key prefix (default: "")
# # For AppRole auth instead of token:
# # auth = "approle"
# # role_id_env = "VAULT_ROLE_ID"
# # secret_id_env = "VAULT_SECRET_ID"

# --- Network rules (destination field) ---

# AI model APIs
[[allow]]
destination = "api.anthropic.com"
ports = [443]

[[allow]]
destination = "api.openai.com"
ports = [443]

# Telegram (needed for approval bot)
[[allow]]
destination = "*.telegram.org"
ports = [443]

# Block cloud metadata endpoints
[[deny]]
destination = "169.254.169.254"

[[deny]]
destination = "100.100.100.200"

# --- UDP rules ---
# Block all UDP by default (safe: legitimate API traffic uses TCP)
[[deny]]
destination = "*"
protocols = ["udp"]
name = "block all UDP by default"

# Allow Google DNS over UDP
[[allow]]
destination = "dns.google"
ports = [53]
protocols = ["udp", "dns"]
name = "allow Google DNS"

# --- Tool rules (tool field) ---

[[allow]]
tool = "github__list_*"
name = "read-only github list"

[[allow]]
tool = "github__get_*"
name = "read-only github get"

[[ask]]
tool = "github__create_*"

[[ask]]
tool = "github__update_*"

[[ask]]
tool = "github__delete_*"

[[ask]]
tool = "filesystem__write_*"

[[deny]]
tool = "exec__*"

# --- Content inspection: deny rules (pattern field) ---
# Content rules apply across all protocols (HTTP, WebSocket, QUIC, etc.).
# In WebSocket frames, deny patterns close the connection. In HTTP/QUIC
# responses, redact patterns replace matched content before forwarding.

[[deny]]
pattern = "(?i)(sk-[a-zA-Z0-9_-]{20,})"
name = "api key in tool arguments"

# --- Content inspection: redact rules ---

[[redact]]
pattern = "(?i)(sk-[a-zA-Z0-9_-]{20,})"
replacement = "[REDACTED_API_KEY]"
name = "api key in responses"

# --- Credential bindings ---
# These map destinations to vault credentials for automatic injection.

[[binding]]
destination = "api.anthropic.com"
ports = [443]
credential = "anthropic_api_key"
header = "x-api-key"

[[binding]]
destination = "api.openai.com"
ports = [443]
credential = "openai_api_key"
header = "Authorization"
template = "Bearer {value}"

# --- Channels ---
# Channels deliver approval requests and receive responses. Multiple channels
# can be enabled simultaneously (first response wins, others get cancelled).
#
# HTTP webhook channel: delivers approvals via HTTP POST with HMAC-SHA256
# signature. Supports sync (200 with verdict in body) and async (202, then
# callback to POST /api/approvals/:id/resolve) response paths.
#
# To add an HTTP channel via CLI:
#   sluice channel add --type http --url https://example.com/sluice/webhook --secret my-hmac-secret
#
# To enable the REST API, set SLUICE_API_TOKEN env var and enable an HTTP channel.
# All /api/* endpoints require bearer token auth and an enabled HTTP channel.

# --- MCP upstream servers ---
# Each upstream is spawned as a child process by the MCP gateway.
# timeout_sec sets the per-upstream request timeout (default: 120s).

# [[mcp_upstream]]
# name = "github"
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-github"]
# timeout_sec = 60

