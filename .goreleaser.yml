version: 2

builds:
  - id: sluice
    main: ./cmd/sluice
    binary: sluice
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: sluice
    builds:
      - sluice
    format: binary
    name_template: "sluice_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: nnemirovsky
    name: sluice
