version: 2

builds:
  - id: sluice
    main: ./cmd/sluice
    binary: sluice
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    overrides:
      - goos: linux
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - CC=aarch64-linux-gnu-gcc
    ldflags:
      - -s -w -linkmode external -extldflags "-static"

archives:
  - id: sluice
    builds:
      - sluice
    format: binary
    name_template: "sluice_{{ .Os }}_{{ .Arch }}"

changelog:
  disable: true

release:
  github:
    owner: nnemirovsky
    name: sluice
